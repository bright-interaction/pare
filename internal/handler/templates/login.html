{{define "content"}}
<div class="auth">
  <h1>Logga in</h1>
  <p>Pare bokföring</p>
  <form method="post" action="/login">
    <input type="hidden" name="csrf" value="{{.CSRF}}">
    <label>E-post</label><input type="email" name="email" required>
    <label>Lösenord</label><input type="password" name="password" required>
    <div style="margin-top:18px"><button class="btn" type="submit">Logga in</button></div>
  </form>
</div>
{{end}}
