{{define "layout"}}<!doctype html>
<html lang="sv"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} · Pare</title>
<style>
  :root{--ink:#16181d;--muted:#6b7280;--bg:#f6f7f9;--card:#fff;--line:#e6e8ec;--accent:#2f6f4f;--accent-weak:#eaf3ee;--danger:#b42318;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .topbar{display:flex;align-items:center;gap:24px;padding:0 24px;height:56px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .brand{font-weight:700;font-size:18px;letter-spacing:-0.3px}
  .topbar nav{display:flex;gap:18px;flex:1}
  .topbar nav a{color:var(--ink);font-weight:500}
  .who{color:var(--muted);font-size:13px;display:flex;gap:8px;align-items:center}
  .who form{display:inline} .who button{background:none;border:none;color:var(--accent);cursor:pointer;font:inherit;padding:0}
  main{max-width:960px;margin:0 auto;padding:28px 24px}
  .auth{max-width:380px;margin:8vh auto;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px}
  .auth h1{margin:0 0 4px;font-size:22px} .auth p{color:var(--muted);margin:0 0 20px}
  h1{font-size:22px;margin:0 0 18px;letter-spacing:-0.3px}
  h2{font-size:15px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:26px 0 10px}
  label{display:block;font-weight:500;margin:12px 0 4px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff}
  input:focus,select:focus{outline:2px solid var(--accent-weak);border-color:var(--accent)}
  button.btn,.btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font:inherit;font-weight:600;cursor:pointer}
  .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:#fff;color:var(--danger);border:1px solid var(--danger)}
  .btn.small{padding:5px 10px;font-size:13px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .card .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .card .v{font-size:24px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:10px 12px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .pill.finalized{background:var(--accent-weak);color:var(--accent)} .pill.draft{background:#f1f2f4;color:var(--muted)}
  .pill.paid{background:#e8f0fe;color:#1a56db}
  .pill.ai{background:#eef2ff;color:#4338ca} .pill.user{background:var(--accent-weak);color:var(--accent)} .pill.system{background:#f1f2f4;color:var(--muted)}
  .alert{padding:10px 14px;border-radius:8px;margin-bottom:16px} .alert.error{background:#fdecea;color:var(--danger)} .alert.ok{background:var(--accent-weak);color:var(--accent)}
  .row{display:flex;gap:10px;align-items:end} .row>*{flex:1}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .muted{color:var(--muted)} .empty{color:var(--muted);padding:24px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px}
  .linegrid{display:grid;grid-template-columns:3fr 1fr 1fr 1.4fr;gap:8px;margin-bottom:6px}
  .report-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  @media(max-width:760px){.report-grid{grid-template-columns:1fr}}
  .report-grid h2{margin-top:0}
  tr.grouprow td{font-weight:600;color:var(--ink);background:#fbfcfd;text-transform:none;letter-spacing:0;font-size:13px}
  tr.subtotalrow td{font-weight:600;border-top:1px solid var(--line)}
  tr.totalrow td{font-weight:700;background:var(--accent-weak);color:var(--accent)}
  .momstable{max-width:520px}
</style></head>
<body>
{{if .Email}}
<header class="topbar">
  <div class="brand">Pare</div>
  <nav>
    <a href="/dashboard">Översikt</a>
    <a href="/invoices">Fakturor</a>
    <a href="/supplier-invoices">Kostnader</a>
    <a href="/verifications">Verifikat</a>
    <a href="/counterparties">Kunder</a>
    <a href="/reports">Rapporter</a>
    <a href="/reskontra">Reskontra</a>
    <a href="/bokslut">Bokslut</a>
    <a href="/logg">Logg</a>
    <a href="/settings">Företag</a>
    <a href="/hjalp">Hjälp</a>
  </nav>
  <div class="who">{{.CompanyName}} · {{.Email}}
    <form method="post" action="/logout"><input type="hidden" name="csrf" value="{{.CSRF}}"><button type="submit">Logga ut</button></form>
  </div>
</header>
{{end}}
<main>
  {{if .Error}}<div class="alert error">{{.Error}}</div>{{end}}
  {{if .Flash}}<div class="alert ok">{{.Flash}}</div>{{end}}
  {{template "content" .}}
</main>
</body></html>{{end}}
